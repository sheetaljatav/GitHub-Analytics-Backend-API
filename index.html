<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            color: #e0e0e0;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 127, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .navbar {
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #00d4ff;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
        }

        .navbar-content {
            max-width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff 0%, #ff00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            letter-spacing: 2px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 40px 60px;
            width: 100%;
        }

        header {
            margin-bottom: 60px;
            text-align: center;
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00d4ff 0%, #ff00ff 50%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
            font-weight: bold;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #888;
            font-size: 1.3em;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            justify-content: center;
        }

        input[type="text"] {
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            font-size: 1.1em;
            color: #00d4ff;
            transition: all 0.4s;
            min-width: 400px;
            box-shadow: 
                inset 0 0 20px rgba(0, 212, 255, 0.1),
                0 0 20px rgba(0, 212, 255, 0.2);
            text-shadow: 0 0 5px rgba(0, 212, 255, 0.5);
        }

        input[type="text"]::placeholder {
            color: #00d4ff;
            opacity: 0.5;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ff00ff;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 
                inset 0 0 20px rgba(0, 212, 255, 0.2),
                0 0 30px rgba(0, 212, 255, 0.5),
                0 0 60px rgba(255, 0, 127, 0.3);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        button {
            padding: 18px 50px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #000;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.8),
                0 0 60px rgba(0, 212, 255, 0.4);
            border-color: #ff00ff;
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            color: #00d4ff;
            font-size: 1.4em;
            margin: 40px 0;
        }

        .spinner {
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top: 4px solid #00d4ff;
            border-right: 4px solid #ff00ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 0, 80, 0.1);
            border: 2px solid rgba(255, 0, 80, 0.8);
            color: #ff5080;
            padding: 25px;
            border-radius: 8px;
            margin: 30px auto;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
            text-shadow: 0 0 10px rgba(255, 0, 80, 0.5);
        }

        .results {
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        .profile-header {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 50px;
            margin-bottom: 60px;
            align-items: center;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.08) 0%, rgba(255, 0, 127, 0.08) 100%);
            padding: 50px;
            border-radius: 12px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.6),
                inset 0 0 30px rgba(0, 212, 255, 0.1),
                0 0 40px rgba(0, 212, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .avatar {
            width: 250px;
            height: 250px;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid #00d4ff;
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.6),
                0 0 60px rgba(0, 212, 255, 0.3),
                inset 0 0 30px rgba(0, 212, 255, 0.1);
            position: relative;
            z-index: 10;
            transform: perspective(1000px) rotateY(-5deg);
        }

        .profile-info {
            position: relative;
            z-index: 10;
        }

        .profile-info h2 {
            font-size: 2.8em;
            margin-bottom: 20px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
            letter-spacing: 1px;
        }

        .profile-info p {
            color: #aaa;
            margin-bottom: 12px;
            font-size: 1.1em;
            line-height: 2;
        }

        .bio {
            color: #ff00ff;
            font-style: italic;
            font-size: 1.2em;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.6);
        }

        .github-link {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 35px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3) 0%, rgba(255, 0, 127, 0.2) 100%);
            color: #00d4ff;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.4s;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .github-link:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.5) 0%, rgba(255, 0, 127, 0.4) 100%);
            border-color: #ff00ff;
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.8),
                0 0 60px rgba(255, 0, 127, 0.4);
            transform: translateY(-3px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 153, 255, 0.05) 100%);
            padding: 40px;
            border-radius: 12px;
            border: 2px solid rgba(0, 212, 255, 0.4);
            text-align: center;
            transition: all 0.4s;
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(0, 212, 255, 0.1),
                0 0 20px rgba(0, 212, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            transition: all 0.6s;
        }

        .stat-card:hover {
            border-color: #00d4ff;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.7),
                inset 0 0 30px rgba(0, 212, 255, 0.2),
                0 0 40px rgba(0, 212, 255, 0.4);
            transform: translateY(-8px);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(255, 0, 127, 0.08) 100%);
        }

        .stat-card:hover::before {
            left: 100%;
        }

        .stat-value {
            font-size: 3em;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .stat-label {
            color: #888;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section {
            margin-bottom: 60px;
        }

        .section h3 {
            font-size: 2.2em;
            margin-bottom: 30px;
            color: #00d4ff;
            padding-bottom: 15px;
            border-bottom: 3px solid #ff00ff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
            letter-spacing: 2px;
        }

        .languages {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .lang-tag {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #000;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.4s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            border: 2px solid #00d4ff;
        }

        .lang-tag:hover {
            transform: scale(1.12) translateY(-5px);
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.8),
                0 0 60px rgba(0, 212, 255, 0.4);
        }

        .repos-list {
            display: grid;
            gap: 20px;
        }

        .repo-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.08) 0%, rgba(255, 0, 127, 0.08) 100%);
            padding: 30px;
            border-radius: 12px;
            border: 2px solid rgba(0, 212, 255, 0.25);
            transition: all 0.4s;
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(0, 212, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.15), transparent);
            transition: all 0.6s;
        }

        .repo-card:hover {
            border-color: #00d4ff;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.7),
                inset 0 0 30px rgba(0, 212, 255, 0.1),
                0 0 40px rgba(0, 212, 255, 0.3);
            transform: translateX(8px);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.12) 0%, rgba(255, 0, 127, 0.08) 100%);
        }

        .repo-card:hover::before {
            left: 100%;
        }

        .repo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .repo-name {
            font-weight: bold;
            color: #00d4ff;
            font-size: 1.4em;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
        }

        .top-badge {
            background: linear-gradient(135deg, #ff6b00 0%, #ff8c00 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.5);
        }

        .repo-desc {
            color: #999;
            font-size: 1em;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .repo-stars {
            color: #ffb700;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
            text-shadow: 0 0 8px rgba(255, 183, 0, 0.5);
        }

        .repo-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: bold;
            display: inline-block;
        }

        .repo-link:hover {
            color: #ff00ff;
            text-decoration: underline;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.6);
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding: 40px;
            border-top: 2px solid rgba(0, 212, 255, 0.3);
            color: #666;
            background: rgba(0, 0, 0, 0.3);
        }

        footer p {
            margin: 10px 0;
            font-size: 1.1em;
        }

        .timestamp {
            color: #555;
            font-size: 0.95em;
            margin-top: 15px;
        }

        @media (max-width: 1400px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .container {
                padding: 30px 40px;
            }
        }

        @media (max-width: 900px) {
            .profile-header {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .avatar {
                width: 200px;
                height: 200px;
                margin: 0 auto;
            }

            h1 {
                font-size: 2.5em;
            }

            input[type="text"] {
                min-width: 250px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px 20px;
            }
        }

        @media (max-width: 600px) {
            .search-box {
                flex-direction: column;
            }

            input[type="text"] {
                min-width: 100%;
            }

            button {
                width: 100%;
            }

            .avatar {
                width: 150px;
                height: 150px;
            }

            h1 {
                font-size: 1.8em;
            }

            .profile-header {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo">🔥 GitHub Analytics Dashboard</div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Explore GitHub Profiles</h1>
            <p class="subtitle">Search for any GitHub user and get comprehensive analytics in seconds</p>
        </header>

        <div class="search-box">
            <input 
                type="text" 
                id="username" 
                placeholder="Search GitHub username... (e.g., torvalds, octocat)"
                onkeypress="if(event.key === 'Enter') searchUser()"
            >
            <button onclick="searchUser()">Search</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            Fetching GitHub data...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="results" class="results" style="display: none;"></div>

        <footer>
            <p>🚀 GitHub Analytics API v1.0</p>
            <p>Real-time data from GitHub API</p>
        </footer>
    </div>

    <script>
        // Function to search for a GitHub user
        async function searchUser() {
            const username = document.getElementById('username').value.trim();

            // Validate input
            if (!username) {
                showError('Please enter a GitHub username');
                return;
            }

            // Show loading, hide error and results
            showLoading(true);
            document.getElementById('error').style.display = 'none';
            document.getElementById('results').style.display = 'none';

            try {
                // Fetch data from our API
                const response = await fetch(`http://localhost:5000/api/github/${username}`);
                const data = await response.json();

                // Check if request was successful
                if (!response.ok) {
                    showError(data.error + ': ' + data.message);
                    showLoading(false);
                    return;
                }

                // Display results
                displayResults(data.data);
                showLoading(false);

            } catch (error) {
                showError('Error connecting to API: ' + error.message);
                showLoading(false);
            }
        }

        // Show/hide loading spinner
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
        }

        // Display results
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');

            // Create profile header
            let html = `
                <div class="profile-header">
                    <div>
                        <img src="${data.avatarUrl}" alt="Avatar" class="avatar">
                    </div>
                    <div class="profile-info">
                        <h2>${data.name}</h2>
                        <p><strong>📍 Location:</strong> ${data.location}</p>
                        <p><strong>🏢 Company:</strong> ${data.company}</p>
                        <p class="bio">"${data.bio}"</p>
                        <a href="${data.profileUrl}" target="_blank" class="github-link">
                            View GitHub Profile →
                        </a>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.followers.toLocaleString()}</div>
                        <div class="stat-label">👥 Followers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.following.toLocaleString()}</div>
                        <div class="stat-label">👤 Following</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.publicRepos}</div>
                        <div class="stat-label">📦 Repositories</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.totalStars.toLocaleString()}</div>
                        <div class="stat-label">⭐ Total Stars</div>
                    </div>
                </div>
            `;

            // Add languages section
            if (data.languages.length > 0) {
                html += `
                    <div class="section">
                        <h3>🗣️ Programming Languages</h3>
                        <div class="languages">
                            ${data.languages.map(lang => `<span class="lang-tag">${lang}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            // Add top repositories
            if (data.topRepositories.length > 0) {
                html += `
                    <div class="section">
                        <h3>⭐ Top 5 Repositories</h3>
                        <div class="repos-list">
                            ${data.topRepositories.map((repo, index) => `
                                <div class="repo-card">
                                    <div class="repo-header">
                                        <div class="repo-name">${repo.name}</div>
                                        <div class="top-badge">#${index + 1}</div>
                                    </div>
                                    <div class="repo-desc">${repo.description}</div>
                                    <div class="repo-stars">⭐ ${repo.stars.toLocaleString()} stars</div>
                                    <a href="${repo.url}" target="_blank" class="repo-link">
                                        View Repository →
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Add timestamp
            html += `
                <div class="timestamp">
                    Last updated: ${new Date().toLocaleString()}
                </div>
            `;

            resultsDiv.innerHTML = html;
            resultsDiv.style.display = 'block';
        }

        // Focus input on page load
        window.addEventListener('load', () => {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
